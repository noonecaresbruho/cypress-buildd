name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check if this is already reported and make sure you're on the latest version.
        **Security vulnerabilities go to [SECURITY.md](../../SECURITY.md), not here.**

  - type: input
    id: version
    attributes:
      label: Cypress version
      placeholder: e.g. v2.0.2
    validations:
      required: true

  - type: dropdown
    id: game
    attributes:
      label: Game
      options:
        - Garden Warfare 1
        - Garden Warfare 2
        - Battle for Neighborville
        - Not game-specific / Launcher only
        - Backend (master server / relay)
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10
        - Windows 11
        - Linux (Wine)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug. What did you expect, and what actually happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start server with ...
        2. ...
        3. Bug occurs
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant output from the launcher's log panel or server console. Wrap in code blocks if long.
      render: text
