name: Build DLL (Linux)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        game: [GW1, GW2, BFN]

    container:
      image: archlinux:latest

    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm archlinux-keyring
          pacman -Syu --noconfirm base-devel sudo git clang lld make cmake extra-cmake-modules python wine msitools ca-certificates libwbclient

      - name: Create build user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fix permissions
        run: chown -R builder:builder .

      - name: Build
        run: |
          sudo -u builder sh <<'EOF'
          set -e
          cd Server
          export WINDOWS_SDK_PATH="$HOME/my_msvc/opt/msvc"
          mkdir -p $WINDOWS_SDK_PATH
          export WINE=$(command -v wine64 || command -v wine || false)
          $WINE wineboot
          git clone https://github.com/mstorsjo/msvc-wine
          ./msvc-wine/vsdownload.py --accept-license --dest $WINDOWS_SDK_PATH
          ./msvc-wine/install.sh $WINDOWS_SDK_PATH
          export PATH=$WINDOWS_SDK_PATH/bin/x64:$PATH
          cmake --fresh -S . -B build -DCMAKE_BUILD_TYPE=Release -DCYPRESS_${{ matrix.game }}=ON -DWINDOWS_SDK_PATH=$WINDOWS_SDK_PATH -DCMAKE_TOOLCHAIN_FILE=./toolchain-linux-winsdk.cmake
          make -C build -j$(nproc)
          EOF

      - name: Upload artifact/s
        uses: actions/upload-artifact@v7
        with:
          name: DLL-${{ matrix.game }}
          path: |
            Server/build/cypress_GW1.dll
            Server/build/cypress_GW2.dll
            Server/build/cypress_BFN.dll
