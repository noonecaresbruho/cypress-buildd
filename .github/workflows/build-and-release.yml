name: Build & Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: 1.0.0)"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  server:
    runs-on: windows-latest
    strategy:
      matrix:
        game: [GW1, GW2, BFN]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Server - ${{ matrix.game }}
        working-directory: Server
        shell: pwsh
        run: |
          cmake --fresh . -B build -G "Visual Studio 17 2022" -DCYPRESS_${{ matrix.game }}=ON
          cmake --build build --config Release

      - name: Upload DLL
        uses: actions/upload-artifact@v7
        with:
          name: cypress_${{ matrix.game }}
          path: Server/build/Release/cypress_${{ matrix.game }}.dll

  launcher:
    needs: server
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Download server DLLs
        uses: actions/download-artifact@v7
        with:
          path: publish/CypressLauncher
          merge-multiple: true

      - name: Build CypressLauncher
        shell: pwsh
        run: |
          $versionArgs = @()
          $releaseTag = "${{ github.event.inputs.release_tag }}"
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and -not [string]::IsNullOrWhiteSpace($releaseTag)) {
            $version = $releaseTag.TrimStart('v', 'V')
            $assemblyVersion = ([regex]::Match($version, '^\d+(?:\.\d+){0,3}')).Value
            if (-not $assemblyVersion) { throw "release tag must start with a numeric version" }
            while (($assemblyVersion.Split('.').Count) -lt 4) { $assemblyVersion += ".0" }
            $versionArgs = @(
              "/p:Version=$version",
              "/p:AssemblyVersion=$assemblyVersion",
              "/p:FileVersion=$assemblyVersion",
              "/p:InformationalVersion=$version"
            )
          }
          dotnet publish Launcher/CypressLauncher.csproj -c Release -f net8.0-windows -o publish/CypressLauncher /p:LangVersion=latest @versionArgs

      - name: Stage release artifacts
        shell: pwsh
        run: |
          $stage = "publish/CypressLauncher"
          if (Test-Path "Launcher/tools")   { Copy-Item "Launcher/tools"   $stage -Recurse -Force }
          if (Test-Path "Launcher/patches") { Copy-Item "Launcher/patches" $stage -Recurse -Force }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Cypress
          path: publish/CypressLauncher

      - name: Create release archive
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' }}
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.release_tag }}"
          Compress-Archive -Path "publish/CypressLauncher/*" -DestinationPath "Cypress-$tag.zip"

      - name: Create GitHub Release
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          files: Cypress-*.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
